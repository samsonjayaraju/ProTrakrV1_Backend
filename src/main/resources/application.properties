spring.application.name=protrackr-server

server.port=8080

# ---- MySQL ----
spring.datasource.url=jdbc:mysql://localhost:3306/protrackrv1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ---- JPA ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Treat "" as null for optional Integer/LocalDate fields the frontend may send as empty strings
spring.jackson.deserialization.accept-empty-string-as-null-object=true

# ---- Schema Init (Flyway disabled due to MySQL 8.4 compatibility) ----
spring.flyway.enabled=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/migration/V1__init.sql

# ---- JWT ----
# Must be 32+ chars for HS256
app.jwt.secret=CHANGE_ME_CHANGE_ME_CHANGE_ME_32_CHARS_MIN
app.jwt.expiration-seconds=86400

# ---- CORS (comma-separated) ----
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ---- Uploads ----
# Files stored on disk under this folder (relative to project root). Requirement: /server/uploads
app.upload.dir=server/uploads
app.upload.public-base-url=/uploads

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

logging.level.org.springframework.security=INFO
